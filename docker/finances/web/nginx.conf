# Nginx config for Finances web SPA
# - Serves Vue 3 SPA at /
# - Proxies /api/* and /health/* to the API container (Docker service name: api)
#
# IMPORTANT: the web client (apps/web/src/api/client.ts) calls baseUrl="/api".
# In dev Vite proxies /api → :3001; in prod this nginx must do the same, or
# the SPA fallback returns 200 HTML for GETs and 405 for POSTs/PUTs/DELETEs.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: only non-asset, non-API GETs serve index.html.
    # Excluding POST/PUT/PATCH/DELETE here makes nginx 405 them explicitly
    # instead of silently serving HTML — much easier to debug.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy ALL /api/* requests to the Go backend (matches Gin routes in
    # backend/internal/api/routes.go: /api/auth/login, /api/accounts, ...).
    # keepalive reduces TLS+HTTP churn on the api container.
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_set_header Connection "";
    }

    location /health {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}