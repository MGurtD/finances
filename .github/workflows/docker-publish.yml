name: docker-publish

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  test-backend:
    name: Test — backend (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install swag
        working-directory: backend
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Generate swagger docs
        working-directory: backend
        run: swag init -g cmd/server/main.go -o internal/docs --parseDependency --parseInternal

      - name: go test ./...
        working-directory: backend
        run: go test ./...

  test-frontend:
    name: Test — frontend (typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Generate + verify OpenAPI schema for web
        # schema.d.ts is committed but generated from the backend's
        # swag output. This single step:
        #   1. Snapshots the committed schema.d.ts.
        #   2. Regenerates swag docs + schema.d.ts from current handlers.
        #   3. Fails if the regenerated file differs from the snapshot —
        #      catching developers who bypassed the pre-push hook
        #      (`--no-verify` or no core.hooksPath set).
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          cp apps/web/src/api/schema.d.ts /tmp/schema.committed.ts
          (cd backend && go run github.com/swaggo/swag/cmd/swag@v1.16.6 init \
            -g cmd/server/main.go -o internal/docs --parseDependency --parseInternal)
          (cd apps/web && pnpm gen:api)
          if ! diff -q /tmp/schema.committed.ts "$GITHUB_WORKSPACE/apps/web/src/api/schema.d.ts" >/dev/null; then
            echo "::error::apps/web/src/api/schema.d.ts is out of sync with backend handlers." >&2
            echo "::error::Regenerate locally with: pnpm gen:api" >&2
            echo "::error::Then commit the result and re-push." >&2
            diff /tmp/schema.committed.ts "$GITHUB_WORKSPACE/apps/web/src/api/schema.d.ts" | head -100 >&2 || true
            exit 1
          fi

      - name: typecheck
        run: pnpm --filter @finances/web typecheck

      - name: vitest
        run: pnpm --filter @finances/web test

  docker-api:
    name: Docker — finances-api
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finances-api
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: latest=auto

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-web:
    name: Docker — finances-web
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finances-web
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: latest=auto

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max